apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eutlas-test

resources:
  - ../base
  - cluster-role-binding.yaml

namePrefix: ""
nameSuffix: ""

# Patches for test environment
patches:
  - path: ingress-patch.yaml
  - patch: |-
      - op: replace
        path: /metadata/name
        value: eutlas-test
    target:
      kind: Namespace
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: eutlas-backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: eutlas-frontend
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: eutlas-mongodb-credentials
      stringData:
        password: "TestPassword2025!"
    target:
      kind: Secret
      name: eutlas-mongodb-credentials
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: eutlas-secrets
      stringData:
        JWT_SECRET: "TestJwtSecret2025Key32Characters!"
        MONGODB_URI: "mongodb://eutlas-admin:TestPassword2025!@mongodb:27017/eutlas-test?authSource=admin"
        RESEND_API_KEY: "PLACEHOLDER_RESEND_API_KEY"
        EMAIL_FROM: "test@eutlas.eu"
        STRIPE_SECRET_KEY: "PLACEHOLDER_STRIPE_SECRET_KEY"
        STRIPE_WEBHOOK_SECRET: "PLACEHOLDER_STRIPE_WEBHOOK_SECRET"
        STRIPE_PUBLISHABLE_KEY: "PLACEHOLDER_STRIPE_PUBLISHABLE_KEY"
        HCLOUD_TOKEN: "PLACEHOLDER_HCLOUD_TOKEN"
        HETZNER_SSH_KEY_NAME: "eutlas-cluster-key"
        HETZNER_CLUSTER_SSH_PRIVATE_KEY: "PLACEHOLDER_SSH_PRIVATE_KEY"
        SEED_ADMIN_EMAIL: "admin-test@eutlas.eu"
        SEED_ADMIN_PASSWORD: "EUTLAS-Test-Admin-2026!"
        SEED_ADMIN_NAME: "EUTLAS Test Admin"
        SEED_ORG_NAME: "EUTLAS Test"
    target:
      kind: Secret
      name: eutlas-secrets
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: eutlas-backend
      spec:
        template:
          spec:
            containers:
              - name: backend
                env:
                  - name: FRONTEND_URL
                    value: "https://test.mongo.eutlas.eu"
                  - name: K8S_CONTROL_PLANE_NAMESPACE
                    value: "eutlas-test"
                  - name: K8S_NAMESPACE_PREFIX
                    value: "eutlas-test-"
    target:
      kind: Deployment
      name: eutlas-backend
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: eutlas-frontend
      spec:
        template:
          spec:
            containers:
              - name: frontend
                env:
                  - name: NEXT_PUBLIC_API_URL
                    value: "https://test.mongo.eutlas.eu/api/v1"
  # The test server is reset frequently, so platform backups add storage
  # requirements without useful recovery value.
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: platform-mongodb-backups
    target:
      kind: PersistentVolumeClaim
      name: platform-mongodb-backups
  - patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: platform-mongodb-backup
    target:
      group: batch
      version: v1
      kind: CronJob
      name: platform-mongodb-backup
  - patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: platform-mongodb-backup-monitor
    target:
      group: batch
      version: v1
      kind: CronJob
      name: platform-mongodb-backup-monitor
  - patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: platform-mongodb-restore-drill
    target:
      group: batch
      version: v1
      kind: CronJob
      name: platform-mongodb-restore-drill
  - patch: |-
      - op: remove
        path: /spec/ingress/1
    target:
      group: networking.k8s.io
      version: v1
      kind: NetworkPolicy
      name: allow-mongodb-from-backend-and-backup-jobs

configMapGenerator:
  - name: eutlas-env
    literals:
      - ENVIRONMENT=test

images:
  - name: ghcr.io/stschuer/eutlas-backend
    newTag: test
  - name: ghcr.io/stschuer/eutlas-frontend
    newTag: test

