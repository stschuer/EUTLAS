apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-mongodb-backups
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-mongodb-backup
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: platform-mongodb-backup
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: dump-platform-mongodb
              image: mongo:7.0
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  ARCHIVE="/backup/platform-${TIMESTAMP}.gz"
                  echo "Starting platform MongoDB backup to ${ARCHIVE}"
                  mongodump \
                    --host=mongodb \
                    --port=27017 \
                    --username="${MONGO_ROOT_USER}" \
                    --password="${MONGO_ROOT_PASSWORD}" \
                    --authenticationDatabase=admin \
                    --archive="${ARCHIVE}" \
                    --gzip
                  SIZE=$(stat -c '%s' "${ARCHIVE}")
                  echo "Backup completed: ${SIZE} bytes"
                  find /backup -name 'platform-*.gz' -mtime +30 -delete
                  echo "Retention cleanup done (kept last 30 days)"
              env:
                - name: MONGO_ROOT_USER
                  value: eutlas-admin
                - name: MONGO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: eutlas-mongodb-credentials
                      key: password
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
              resources:
                limits:
                  cpu: "500m"
                  memory: 512Mi
                requests:
                  cpu: "100m"
                  memory: 256Mi
          containers:
            - name: upload-offsite
              image: minio/mc:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  LATEST="$(ls -1t /backup/platform-*.gz 2>/dev/null | head -1 || true)"
                  if [ -z "${LATEST}" ]; then
                    echo "No platform backup archive found"
                    exit 1
                  fi

                  if [ -z "${S3_ENDPOINT:-}" ] || [ -z "${S3_BUCKET:-}" ] || [ -z "${S3_ACCESS_KEY:-}" ] || [ -z "${S3_SECRET_KEY:-}" ]; then
                    echo "Object storage secret not configured; backup kept on PVC only"
                    exit 0
                  fi

                  mc alias set offsite "${S3_ENDPOINT}" "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"
                  mc mb --region "${S3_REGION:-fsn1}" --ignore-existing "offsite/${S3_BUCKET}"

                  for attempt in 1 2 3 4 5 6; do
                    if mc ls "offsite/${S3_BUCKET}" >/dev/null 2>&1 && mc cp "${LATEST}" "offsite/${S3_BUCKET}/${S3_PREFIX:-platform-mongodb}/"; then
                      break
                    fi

                    if [ "${attempt}" = "6" ]; then
                      echo "Upload failed after ${attempt} attempts"
                      exit 1
                    fi

                    echo "Bucket not ready or upload failed; retrying (${attempt}/6)"
                    sleep 10
                  done
                  echo "Uploaded ${LATEST} to off-site object storage"
              env:
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: endpoint
                      optional: true
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: bucket
                      optional: true
                - name: S3_PREFIX
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: prefix
                      optional: true
                - name: S3_REGION
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: region
                      optional: true
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: accessKey
                      optional: true
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: secretKey
                      optional: true
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
              resources:
                limits:
                  cpu: "250m"
                  memory: 256Mi
                requests:
                  cpu: "50m"
                  memory: 64Mi
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: platform-mongodb-backups
