apiVersion: apps/v1
kind: Deployment
metadata:
  name: eutlas-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eutlas-redis
  template:
    metadata:
      labels:
        app: eutlas-redis
    spec:
      priorityClassName: eutlas-critical
      restartPolicy: Always
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
          resources:
            limits:
              cpu: "250m"
              memory: 256Mi
            requests:
              cpu: "50m"
              memory: 64Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: eutlas-redis
spec:
  selector:
    app: eutlas-redis
  ports:
    - port: 6379
      targetPort: 6379



