apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-mongodb-backup-monitor
spec:
  # Check hourly that an off-site platform backup exists and is fresh.
  schedule: "17 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 10
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: platform-mongodb-backup-monitor
        spec:
          restartPolicy: Never
          containers:
            - name: check-offsite-backup
              image: minio/mc:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu

                  if [ -z "${S3_ENDPOINT:-}" ] || [ -z "${S3_BUCKET:-}" ] || [ -z "${S3_ACCESS_KEY:-}" ] || [ -z "${S3_SECRET_KEY:-}" ]; then
                    echo "Object storage secret is not configured"
                    exit 1
                  fi

                  mc alias set offsite "${S3_ENDPOINT}" "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"
                  PREFIX="${S3_PREFIX:-platform-mongodb}"
                  MAX_AGE="${MAX_BACKUP_AGE:-26h}"
                  LATEST="$(mc find "offsite/${S3_BUCKET}/${PREFIX}" --name 'platform-*.gz' --newer-than "${MAX_AGE}" | sort | tail -1)"

                  if [ -z "${LATEST}" ]; then
                    LATEST_ANY="$(mc find "offsite/${S3_BUCKET}/${PREFIX}" --name 'platform-*.gz' | sort | tail -1)"
                    echo "No platform backup archive newer than ${MAX_AGE}"
                    echo "Latest known archive: ${LATEST_ANY:-none}"
                    exit 1
                  fi

                  echo "Latest fresh off-site backup: ${LATEST}"
                  echo "Off-site backup freshness check passed"
              env:
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: endpoint
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: bucket
                - name: S3_PREFIX
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: prefix
                      optional: true
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: accessKey
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: platform-backup-object-storage
                      key: secretKey
                - name: MAX_BACKUP_AGE
                  value: "26h"
              resources:
                limits:
                  cpu: "100m"
                  memory: 128Mi
                requests:
                  cpu: "25m"
                  memory: 64Mi
