apiVersion: apps/v1
kind: Deployment
metadata:
  name: eutlas-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eutlas-backend
  template:
    metadata:
      labels:
        app: eutlas-backend
    spec:
      serviceAccountName: eutlas-backend
      priorityClassName: eutlas-high
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ghcr.io/stschuer/eutlas-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: SEED_ADMIN_EMAIL
              value: "simon.tschuertz@web.de"
            - name: SEED_ADMIN_NAME
              value: "Simon Tschürtz"
            - name: SEED_ORG_NAME
              value: "RoPhi UG"
            - name: REDIS_URL
              value: "redis://eutlas-redis:6379"
            - name: FRONTEND_URL
              value: "https://mongo.eutlas.eu"
          envFrom:
            - secretRef:
                name: eutlas-secrets
          resources:
            limits:
              cpu: "1000m"
              memory: 768Mi
            requests:
              cpu: "250m"
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: eutlas-backend
spec:
  selector:
    app: eutlas-backend
  ports:
    - port: 4000
      targetPort: 4000
