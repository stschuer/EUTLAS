apiVersion: v1
kind: Secret
metadata:
  name: eutlas-mongodb-credentials
type: Opaque
stringData:
  password: "PLACEHOLDER_MONGODB_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: eutlas-secrets
type: Opaque
stringData:
  JWT_SECRET: "PLACEHOLDER_JWT_SECRET"
  MONGODB_URI: "PLACEHOLDER_MONGODB_URI"
  RESEND_API_KEY: "PLACEHOLDER_RESEND_API_KEY"
  EMAIL_FROM: "noreply@eutlas.eu"
  STRIPE_SECRET_KEY: "PLACEHOLDER_STRIPE_SECRET_KEY"
  STRIPE_WEBHOOK_SECRET: "PLACEHOLDER_STRIPE_WEBHOOK_SECRET"
  STRIPE_PUBLISHABLE_KEY: "PLACEHOLDER_STRIPE_PUBLISHABLE_KEY"
  # Hetzner Cloud API token (for provisioning dedicated cluster nodes)
  HCLOUD_TOKEN: "PLACEHOLDER_HCLOUD_TOKEN"
  # Name of the SSH key uploaded to Hetzner (used to bootstrap new servers)
  HETZNER_SSH_KEY_NAME: "eutlas-cluster-key"
  # Matching private key (PEM format, single line with \n) — must correspond to HETZNER_SSH_KEY_NAME
  HETZNER_CLUSTER_SSH_PRIVATE_KEY: "PLACEHOLDER_SSH_PRIVATE_KEY"



