apiVersion: batch/v1
kind: CronJob
metadata:
  name: completed-pod-cleanup
spec:
  schedule: "*/30 * * * *"   # every 30 minutes
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 60
      template:
        spec:
          serviceAccountName: eutlas-backend
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Cleaning up completed/failed pods in eutlas namespace..."
                  kubectl delete pods -n eutlas --field-selector=status.phase=Succeeded 2>/dev/null || true
                  kubectl delete pods -n eutlas --field-selector=status.phase=Failed 2>/dev/null || true
                  echo "Done. Remaining pods:"
                  kubectl get pods -n eutlas
              resources:
                limits:
                  cpu: "100m"
                  memory: 64Mi
                requests:
                  cpu: "50m"
                  memory: 32Mi
