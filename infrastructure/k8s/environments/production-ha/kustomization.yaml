apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deliberately separate from the production overlay. Applying this overlay is a
# controlled migration step after the multi-node/storage prerequisites pass.
resources:
  - ../production
  - ../../platform-mongodb-ha

patches:
  - path: backend-mongodb-ha-tls-patch.yaml
  - path: platform-backup-ha-tls-patch.yaml
