apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-mongodb-backup
spec:
  jobTemplate:
    spec:
      template:
        spec:
          initContainers:
            - name: dump-platform-mongodb
              args:
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  ARCHIVE="/backup/platform-${TIMESTAMP}.gz"
                  RS_HOSTS="platform-mongodb-ha/platform-mongodb-ha-0.platform-mongodb-ha-svc.eutlas.svc.cluster.local:27017,platform-mongodb-ha-1.platform-mongodb-ha-svc.eutlas.svc.cluster.local:27017,platform-mongodb-ha-2.platform-mongodb-ha-svc.eutlas.svc.cluster.local:27017"
                  echo "Starting platform MongoDB HA backup to ${ARCHIVE}"
                  mongodump \
                    --host="${RS_HOSTS}" \
                    --ssl \
                    --sslCAFile=/etc/eutlas/mongodb/ca.crt \
                    --username="${MONGO_ROOT_USER}" \
                    --password="${MONGO_ROOT_PASSWORD}" \
                    --authenticationDatabase=admin \
                    --archive="${ARCHIVE}" \
                    --gzip
                  SIZE=$(stat -c '%s' "${ARCHIVE}")
                  echo "Backup completed: ${SIZE} bytes"
                  find /backup -name 'platform-*.gz' -mtime +30 -delete
                  echo "Retention cleanup done (kept last 30 days)"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
                - name: platform-mongodb-ha-ca
                  mountPath: /etc/eutlas/mongodb
                  readOnly: true
          volumes:
            - name: platform-mongodb-ha-ca
              secret:
                secretName: platform-mongodb-ha-ca
                items:
                  - key: tls.crt
                    path: ca.crt
