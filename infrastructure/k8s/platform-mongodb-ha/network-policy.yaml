apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-mongodb-ha-clients
spec:
  podSelector:
    matchLabels:
      app: platform-mongodb-ha-svc
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: eutlas-backend
      ports:
        - protocol: TCP
          port: 27017
    - from:
        - podSelector:
            matchLabels:
              app: platform-mongodb-backup
        - podSelector:
            matchLabels:
              app: platform-mongodb-restore-drill
        - podSelector:
            matchLabels:
              app: platform-mongodb-ha-restore
      ports:
        - protocol: TCP
          port: 27017
    - from:
        - podSelector:
            matchLabels:
              app: platform-mongodb-ha-svc
      ports:
        - protocol: TCP
          port: 27017
