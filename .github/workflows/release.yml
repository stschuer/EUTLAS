name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/eutlas-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/eutlas-frontend
  BUILDKIT_IMAGE: moby/buildkit:v0.19.0

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=${{ env.BUILDKIT_IMAGE }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Backend (Release)
        uses: nick-fields/retry@v3
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        with:
          max_attempts: 3
          retry_wait_seconds: 45
          timeout_minutes: 15
          command: |
            set -euo pipefail
            docker buildx build \
              --file ./backend/Dockerfile \
              --push \
              --cache-from type=gha \
              --cache-to type=gha,mode=min \
              --tag "${{ env.BACKEND_IMAGE }}:${VERSION}" \
              --tag "${{ env.BACKEND_IMAGE }}:latest" \
              --tag "${{ env.BACKEND_IMAGE }}:stable" \
              .

      - name: Build and push Frontend (Release)
        uses: nick-fields/retry@v3
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        with:
          max_attempts: 3
          retry_wait_seconds: 45
          timeout_minutes: 15
          command: |
            set -euo pipefail
            docker buildx build \
              --file ./frontend/Dockerfile \
              --push \
              --cache-from type=gha \
              --cache-to type=gha,mode=min \
              --build-arg "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}" \
              --tag "${{ env.FRONTEND_IMAGE }}:${VERSION}" \
              --tag "${{ env.FRONTEND_IMAGE }}:latest" \
              --tag "${{ env.FRONTEND_IMAGE }}:stable" \
              .

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## EUTLAS ${{ steps.version.outputs.VERSION }}
            
            ### Docker Images
            ```
            docker pull ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            docker pull ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ```
            
            ### Changelog
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}




